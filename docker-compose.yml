services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ewp
      POSTGRES_PASSWORD: ewp
      POSTGRES_DB: ewp
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  django:
    build:
      context: ./backend
      dockerfile: django_service/Dockerfile
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_DB_ENGINE: django.db.backends.postgresql
      DJANGO_DB_NAME: ewp
      DJANGO_DB_USER: ewp
      DJANGO_DB_PASSWORD: ewp
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "5432"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  fastapi:
    build:
      context: ./backend
      dockerfile: fastapi_service/Dockerfile
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql+psycopg://ewp:ewp@db:5432/ewp
      DJANGO_AUTH_URL: http://django:8000
      DJANGO_SECRET_KEY: dev-secret-key
      CORS_ALLOW_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      CHART_EXPLAIN_PROVIDER: gemini
    depends_on:
      - db
      - django
    ports:
      - "8001:8001"
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8001

volumes:
  db_data:

