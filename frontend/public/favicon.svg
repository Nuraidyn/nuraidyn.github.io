<svg width="160" height="160" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#082640"/>
    </linearGradient>
    <linearGradient id="sig" x1="10" y1="38" x2="38" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.45" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="halo" cx="1" cy="0" r="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <rect width="48" height="48" rx="12" fill="url(#halo)"/>

  <!-- Grid (E-bar motif) -->
  <line x1="11" y1="18" x2="37" y2="18" stroke="#E2E8F0" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="11" y1="26" x2="37" y2="26" stroke="#E2E8F0" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="11" y1="34" x2="37" y2="34" stroke="#E2E8F0" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="24" y1="11" x2="24" y2="37" stroke="#E2E8F0" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Equality diagonal -->
  <line x1="11" y1="37" x2="37" y2="11" stroke="#DBEAFE" stroke-opacity="0.3" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="4 4"/>

  <!-- Curve glow -->
  <path d="M11 37 C19 30 27 22 37 11" stroke="url(#sig)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" stroke-opacity="0.55"/>

  <!-- Signal curve -->
  <path d="M11 37 C19 30 27 22 37 11" stroke="url(#sig)" stroke-width="3.2" stroke-linecap="round"/>

  <!-- Iris / eye at apex -->
  <path d="M37 11 L33 15" stroke="#67E8F9" stroke-opacity="0.55" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M37 11 L41 15" stroke="#67E8F9" stroke-opacity="0.55" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Data dots -->
  <circle cx="11" cy="37" r="2.2" fill="#F8FAFC"/>
  <circle cx="24" cy="24" r="2" fill="#BAE6FD"/>
  <circle cx="37" cy="11" r="3" fill="#22D3EE"/>
  <circle cx="37" cy="11" r="5.2" stroke="#67E8F9" stroke-opacity="0.4" stroke-width="1.3" fill="none"/>

  <!-- Card border -->
  <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="11.25" stroke="#E2E8F0" stroke-opacity="0.18" stroke-width="1.5" fill="none"/>
</svg>
